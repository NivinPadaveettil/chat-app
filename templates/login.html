{% extends 'base.html' %}

{% block content %}
<div class="min-h-screen bg-gradient-to-b from-gray-900 to-gray-800 flex items-center justify-center p-4">
    <div class="w-full max-w-md">
        <!-- Card -->
        <div class="bg-gray-800 rounded-2xl sm:rounded-3xl shadow-2xl p-6 sm:p-8 border border-green-500 border-opacity-30">
            <!-- Header -->
            <div class="text-center mb-6 sm:mb-8">
                <div class="w-16 sm:w-20 h-16 sm:h-20 mx-auto bg-gradient-to-br from-green-400 to-green-600 rounded-full flex items-center justify-center mb-3 sm:mb-4 shadow-lg">
                    <i class="fas fa-mobile text-white text-2xl sm:text-3xl"></i>
                </div>
                <h1 class="text-2xl sm:text-3xl font-bold text-white">Link Device</h1>
                <p class="text-gray-400 mt-1 sm:mt-2 text-sm sm:text-base">Join Inderbara</p>
            </div>

            <!-- Session ID Info -->
            <div class="bg-gray-700 rounded-lg p-3 sm:p-4 mb-5 sm:mb-6 text-center">
                <p class="text-gray-300 text-xs sm:text-sm">Session ID</p>
                <code class="text-green-400 font-mono text-base sm:text-lg break-all">{{ session_id }}</code>
            </div>

            <!-- Form -->
            <form method="POST" class="space-y-3 sm:space-y-4">
                {% csrf_token %}
                
                <!-- Username -->
                <div>
                    <label class="block text-gray-300 mb-2 text-sm sm:text-base">Username</label>
                    <input type="text" name="username" placeholder="Enter your name" 
                        class="w-full bg-gray-700 text-white px-3 sm:px-4 py-2 sm:py-3 rounded-lg border border-green-500 border-opacity-30 focus:border-green-400 focus:outline-none text-sm sm:text-base" required>
                </div>

                <!-- Device Name -->
                <div>
                    <label class="block text-gray-300 mb-2 text-sm sm:text-base">Device Name</label>
                    <input type="text" name="device_name" placeholder="e.g., My iPhone" 
                        class="w-full bg-gray-700 text-white px-3 sm:px-4 py-2 sm:py-3 rounded-lg border border-green-500 border-opacity-30 focus:border-green-400 focus:outline-none text-sm sm:text-base">
                </div>

                <!-- Submit Button -->
                <button type="submit" class="w-full bg-gradient-to-r from-green-500 to-green-600 text-white font-bold py-2.5 sm:py-3 rounded-lg hover:from-green-600 hover:to-green-700 transition transform hover:scale-105 mt-6 text-sm sm:text-base touch-target">
                    <i class="fas fa-sign-in-alt mr-2"></i> Join Chat
                </button>
            </form>

            <!-- Info -->
            <p class="text-gray-400 text-xs text-center mt-5 sm:mt-6">
                By joining, you agree to our terms. Your chats are encrypted end-to-end.
            </p>
        </div>

        <!-- Back Link -->
        <div class="text-center mt-4 sm:mt-6">
            <a href="/" class="text-green-400 hover:text-green-300 text-xs sm:text-sm">← Back to Splash</a>
        </div>
    </div>
</div>
{% endblock %}
