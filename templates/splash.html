
{% extends 'base.html' %}

{% block content %}
<div class="h-screen flex items-center justify-center bg-gradient-to-br from-green-500 to-green-700 relative overflow-hidden p-4">
    <!-- Animated Background -->
    <div class="absolute inset-0 opacity-10">
        <div class="absolute top-20 left-10 w-32 sm:w-72 h-32 sm:h-72 bg-white rounded-full mix-blend-multiply filter blur-3xl animate-pulse"></div>
        <div class="absolute top-40 right-10 w-32 sm:w-72 h-32 sm:h-72 bg-white rounded-full mix-blend-multiply filter blur-3xl animate-pulse" style="animation-delay: 2s"></div>
    </div>

    <!-- Content -->
    <div class="relative text-center z-10 w-full max-w-md">
        <!-- Logo -->
        <div class="mb-6 sm:mb-8 animate-bounce">
            <div class="w-20 sm:w-24 h-20 sm:h-24 mx-auto bg-white rounded-full flex items-center justify-center shadow-2xl">
                <i class="fas fa-comments text-green-500 text-3xl sm:text-5xl"></i>
            </div>
        </div>

        <!-- Title -->
        <h1 class="text-3xl sm:text-5xl font-bold text-white mb-3 sm:mb-4 drop-shadow-lg">Inderbara</h1>
        
        <!-- Subtitle -->
        <p class="text-base sm:text-xl text-gray-100 mb-8 sm:mb-12 drop-shadow-md">
            <span class="inline-block opacity-75">Company opening soon...</span>
        </p>

        <!-- Call to Action -->
        <div class="flex flex-col gap-4">
            <a href="#" onclick="startQRLogin(); return false;" class="px-6 sm:px-8 py-2.5 sm:py-3 bg-white text-green-600 font-bold rounded-full hover:bg-gray-100 transition transform hover:scale-105 shadow-lg text-sm sm:text-base touch-target">
                <i class="fas fa-qrcode mr-2"></i> <span>Get Started</span>
            </a>
            <p class="text-xs sm:text-sm text-gray-200">Scan QR code on desktop to join</p>
        </div>
    </div>

    <!-- Floating Elements -->
    <div class="absolute bottom-10 left-10 text-white opacity-20">
        <i class="fas fa-envelope text-2xl sm:text-4xl animate-pulse"></i>
    </div>
    <div class="absolute top-1/4 right-5 sm:right-20 text-white opacity-20">
        <i class="fas fa-paper-plane text-2xl sm:text-4xl" style="animation: float 3s ease-in-out infinite;"></i>
    </div>
</div>

<script>
    function startQRLogin() {
        fetch('/qr-login/')
            .then(r => r.json())
            .then(data => {
                // Redirect to login with QR
                window.location.href = '/link/' + data.session_id + '/';
            });
    }
</script>

<style>
    @keyframes float {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-20px); }
    }
</style>
{% endblock %}
